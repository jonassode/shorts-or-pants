<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shorts or Pants?</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #74b9ff 0%, #a29bfe 100%);
      transition: background 0.6s ease;
    }

    body.shorts {
      background: linear-gradient(135deg, #fdcb6e 0%, #e17055 100%);
    }

    body.pants {
      background: linear-gradient(135deg, #74b9ff 0%, #636e72 100%);
    }

    .card {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 24px;
      padding: 2.5rem 3rem;
      text-align: center;
      color: #fff;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    }

    .card h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 1.5rem;
    }

    .recommendation {
      font-size: 5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .emoji {
      font-size: 3.5rem;
      margin-bottom: 1.25rem;
    }

    .weather-info {
      font-size: 0.9rem;
      opacity: 0.85;
      margin-top: 1.25rem;
      line-height: 1.6;
    }

    .weather-info span {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 0.25rem 0.75rem;
      margin: 0.2rem;
      font-weight: 500;
    }

    .location {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 1rem;
    }

    #status {
      font-size: 1rem;
      opacity: 0.9;
    }

    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.75rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .retry-btn {
      margin-top: 1.25rem;
      padding: 0.6rem 1.5rem;
      background: rgba(255,255,255,0.25);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .retry-btn:hover {
      background: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Shorts or Pants?</h1>
    <div id="content">
      <div class="spinner"></div>
      <p id="status">Getting your location…</p>
    </div>
  </div>

  <script>
    const content = document.getElementById('content');
    const status  = document.getElementById('status');

    function showLoading(msg) {
      content.innerHTML = `<div class="spinner"></div><p id="status">${msg}</p>`;
    }

    function showError(msg) {
      content.innerHTML = `
        <div class="emoji">😕</div>
        <p id="status">${msg}</p>
        <button class="retry-btn" onclick="init()">Try again</button>
      `;
    }

    async function fetchWeather(lat, lon) {
      const url = new URL('https://api.open-meteo.com/v1/forecast');
      url.searchParams.set('latitude', lat);
      url.searchParams.set('longitude', lon);
      url.searchParams.set('daily', 'temperature_2m_max,precipitation_sum');
      url.searchParams.set('timezone', 'auto');
      url.searchParams.set('forecast_days', '1');

      const response = await fetch(url);
      if (!response.ok) throw new Error('Weather API request failed');
      return response.json();
    }

    async function getLocationName(lat, lon) {
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`,
          { headers: { 'User-Agent': 'ShortsOrPants/1.0 (https://github.com/jonassode/shorts-or-pants)' } }
        );
        if (!res.ok) return null;
        const data = await res.json();
        const addr = data.address || {};
        return addr.city || addr.town || addr.village || addr.county || null;
      } catch {
        return null;
      }
    }

    function renderResult(recommendation, maxTemp, precipitation, locationName) {
      const isShorts = recommendation === 'Shorts';
      document.body.classList.toggle('shorts', isShorts);
      document.body.classList.toggle('pants', !isShorts);

      const emoji    = isShorts ? '🩳' : '👖';
      const tempText = `🌡️ ${maxTemp.toFixed(1)}°C peak`;
      const rainText = precipitation > 0
        ? `🌧️ ${precipitation.toFixed(1)} mm rain`
        : '☀️ No rain';
      const locText  = locationName ? `📍 ${locationName}` : '';

      content.innerHTML = `
        <div class="emoji">${emoji}</div>
        <div class="recommendation">${recommendation}</div>
        <div class="weather-info">
          <span>${tempText}</span>
          <span>${rainText}</span>
        </div>
        ${locText ? `<div class="location">${locText}</div>` : ''}
      `;
    }

    async function run(lat, lon) {
      showLoading('Fetching today\'s weather…');

      const [weather, locationName] = await Promise.all([
        fetchWeather(lat, lon),
        getLocationName(lat, lon)
      ]);

      const maxTemp     = weather.daily.temperature_2m_max[0];
      const precipitation = weather.daily.precipitation_sum[0] ?? 0;

      const isShorts = maxTemp >= 25 && precipitation < 0.1;
      renderResult(isShorts ? 'Shorts' : 'Pants', maxTemp, precipitation, locationName);
    }

    function init() {
      document.body.classList.remove('shorts', 'pants');
      showLoading('Getting your location…');

      if (!navigator.geolocation) {
        showError('Geolocation is not supported by your browser.');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        pos => run(pos.coords.latitude, pos.coords.longitude).catch(() => {
          showError('Could not fetch weather data. Please try again.');
        }),
        () => showError('Location access denied. Please allow location access and try again.')
      );
    }

    init();
  </script>
</body>
</html>
